version: '3.8'

services:
  manager:
    build:
      context: .
      dockerfile: apps/manager/Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      # Mount source code để có hot reload
      - ./apps:/app/apps
      - ./packages:/app/packages
      - ./internal:/app/internal
      - ./scripts:/app/scripts
      # Không mount node_modules từ host
      - manager_node_modules:/app/node_modules
      - manager_app_node_modules:/app/apps/manager/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  company:
    build:
      context: .
      dockerfile: apps/company/Dockerfile.dev
    ports:
      - "5174:5174"
    volumes:
      # Mount source code để có hot reload
      - ./apps:/app/apps
      - ./packages:/app/packages
      - ./internal:/app/internal
      - ./scripts:/app/scripts
      # Không mount node_modules từ host
      - company_node_modules:/app/node_modules
      - company_app_node_modules:/app/apps/company/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped

volumes:
  manager_node_modules:
  manager_app_node_modules:
  company_node_modules:
  company_app_node_modules: